name: Refresh IPO Data

on:
  schedule:
    - cron: '0 1 * * *'    # 6:30 AM IST
    - cron: '0 7 * * *'    # 12:30 PM IST
    - cron: '0 13 * * *'   # 6:30 PM IST
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-ipo-data
  cancel-in-progress: false

jobs:

  scrape_live_data:
    name: "1 · Scrape live IPO data"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install scraper dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Run IPO scraper
        run: |
          python scraper.py

      - name: Commit and push live IPO data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -f data/live_ipo_data.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Live data refresh: $(date +'%Y-%m-%d %H:%M IST')"
            git push origin HEAD:main
          fi


  drhp_pipeline:
    name: "2 · DRHP download + chunk + Pinecone"
    runs-on: ubuntu-latest
    needs: scrape_live_data

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml pdfplumber \
                      sentence-transformers numpy pinecone python-dotenv

      - name: Download DRHP PDFs
        run: |
          python drhp_scraper.py
        continue-on-error: true

      - name: Semantic chunking + embedding
        run: |
          python rag_indexer.py
        continue-on-error: true

      - name: Push new chunks to Pinecone
        env:
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
        run: |
          python pinecone_push_new.py
        continue-on-error: true


  ai_cache:
    name: "3 · Generate AI scorecards"
    runs-on: ubuntu-latest
    needs: drhp_pipeline

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install requests anthropic sentence-transformers \
                      numpy pinecone python-dotenv

      - name: Generate AI scorecards
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
        run: |
          python ai_cache.py
        continue-on-error: true

      - name: Commit and push AI cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -f data/ai_cache.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "AI cache update: $(date +'%Y-%m-%d %H:%M IST')"
            git push origin HEAD:main
          fi